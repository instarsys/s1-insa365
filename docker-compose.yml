services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: insa365
      POSTGRES_USER: insa365
      POSTGRES_PASSWORD: insa365dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pgdata:
